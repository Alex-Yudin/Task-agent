plugins {
    id "com.android.application"
}

android {
    namespace "ru.orbita.taskagent"
    compileSdk 36

    defaultConfig {
        applicationId "ru.orbita.taskagent"
        minSdk 26
        targetSdk 36
        versionCode 3
        versionName "0.3.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
