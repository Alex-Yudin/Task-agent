name: Test Windows core

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "test/**"
      - "appsettings.json"
      - "package.json"
      - ".github/workflows/node-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "test/**"
      - "appsettings.json"
      - "package.json"
      - ".github/workflows/node-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

      - name: Check syntax
        run: npm run check
