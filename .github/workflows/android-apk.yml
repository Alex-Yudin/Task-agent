name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.0"

      - name: Build debug APK
        run: gradle :android-app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp android-app/build/outputs/apk/debug/android-app-debug.apk Orbita-Android-v0.2.0-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Orbita-Android-v0.2.0
          path: Orbita-Android-v0.2.0-debug.apk
          if-no-files-found: error
          retention-days: 30
